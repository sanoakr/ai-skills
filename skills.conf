# Claude Code スキル設定（外部スキルのみ）
# 1行1スキル。# で始まる行と空行は無視される。
#
# 書式:
#   skill-name@owner/repo    → setup.fish で自動インストール
#   ?skill-name@owner/repo   → 個別インストール推奨（setup 対象外）
#   ~skill-name@owner/repo   → 対応待ち（gh skill 非対応）
#
# ローカルスキル（SKILL.md を含むディレクトリ）は自動検出されるため
# このファイルには記載不要。
#
# 追加方法:
#   ./setup.fish add <skill-name>@<owner/repo>
# 一覧・インストール状況確認:
#   ./setup.fish list
#
# 整理履歴（2026-07-12）:
# - 削除: git-workflow, meeting-minutes, internal-comms, brand-guidelines, cmux
#   — 最新モデルの素の能力や Claude Code 内蔵機能（git/PR ワークフロー,
#   /code-review 等）と重複する純プロンプト知識系のため登録解除。
# - ? 降格分（Azure/AWS・創作系）はアンインストール済み。必要になったら
#   gh skill install <repo> <skill> で個別導入する。
# - install/sync はインストール先エージェントの明示が必須になった
#   （例: ./setup.fish install claude-code）。

