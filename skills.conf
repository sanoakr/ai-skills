# Claude Code スキル設定（外部スキルのみ）
# 1行1スキル。# で始まる行と空行は無視される。
#
# 書式:
#   skill-name@owner/repo    → setup.fish で自動インストール
#   ?skill-name@owner/repo   → 個別インストール推奨（setup 対象外）
#   ~skill-name@owner/repo   → 対応待ち（gh skill 非対応）
#
# ローカルスキル（SKILL.md を含むディレクトリ）は自動検出されるため
# このファイルには記載不要。
#
# 追加方法:
#   ./setup.fish add <skill-name>@<owner/repo>
# 一覧・インストール状況確認:
#   ./setup.fish list
#
# 注記（2026-07-12）: インストール済みのまま skillOverrides（~/.claude/settings.json、
# chezmoi 管理: sanoakr/dotfiles）で "user-invocable-only" に設定しているスキルは、
# モデルのスキル一覧には載らないため /スキル名 で手動起動する。
#   対象: microsoft-foundry, azure-ai, azure-cost, azure-deploy, azure-rbac,
#         azure-resource-lookup, deploy-on-aws, slack-gif-creator
#
# 削除（2026-07-12）: git-workflow, meeting-minutes, internal-comms,
# brand-guidelines, cmux — 最新モデルの素の能力や Claude Code 内蔵機能
# （git/PR ワークフロー, /code-review 等）と重複する純プロンプト知識系のため登録解除。

